name: Deploy Preview

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel (preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Vercel token
        id: check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No VERCEL_TOKEN secret set — skipping deploy (see README Deployment section)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        if: steps.check.outputs.skip != 'true'
        run: npm i -g vercel@latest

      - name: Deploy preview
        if: steps.check.outputs.skip != 'true'
        id: deploy
        run: |
          vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }} > url.txt 2>&1 || true
          URL=$(tail -1 url.txt)
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          cat url.txt
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with preview URL
        if: steps.check.outputs.skip != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${{ steps.deploy.outputs.preview_url }}`
            })
