name: Deploy Preview (GitHub Pages)

# Static-export preview build published to GitHub Pages.
# Provides a live preview URL with no external credentials required — the
# built-in GITHUB_TOKEN is used. This runs alongside the Vercel Deploy
# Preview workflow; once Vercel credentials are connected, that becomes the
# primary preview and this remains as a zero-config fallback.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Build & deploy static preview to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
